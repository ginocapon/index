<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a1220">
  <meta name="robots" content="noindex, follow">
  <title>Visita virtuale | Righetto Immobiliare</title>
  <link rel="preload" href="fonts/montserrat-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/montserrat-700.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/visita-virtuale.css?v=2">
</head>
<body class="vv-page">
  <div class="vv-app" id="vvApp">
    <header class="vv-topbar">
      <div class="vv-brand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        <div class="vv-brand-text">
          <strong id="vvTitle">Visita virtuale</strong>
          <span id="vvLocation">Righetto Immobiliare</span>
        </div>
      </div>
      <div class="vv-actions">
        <a class="vv-btn" id="vvImmobileLink" href="immobili">
          <span class="vv-btn-text">Scheda</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <button type="button" class="vv-btn" id="vvFullscreen" aria-label="Schermo intero">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
      </div>
    </header>

    <div class="vv-stage-wrap">
      <div class="vv-loading" id="vvLoading" aria-live="polite">
        <div class="vv-spinner" aria-hidden="true"></div>
        <span>Caricamento visita virtuale…</span>
      </div>
      <div class="vv-error" id="vvError" style="display:none" role="alert">
        <strong>Visita non disponibile</strong>
        <p></p>
        <a class="vv-btn" href="immobili">Torna agli immobili</a>
      </div>
      <div class="vv-viewport" id="vvViewport">
        <div class="vv-pan-layer" id="vvPanLayer">
          <img class="vv-scene-img" id="vvSceneImg" alt="" width="1920" height="1080" decoding="async">
        </div>
        <div class="vv-vignette" aria-hidden="true"></div>
        <div class="vv-scene-label">
          <div>
            <strong id="vvSceneName">—</strong>
            <span id="vvSceneCounter">1 / 1</span>
          </div>
        </div>
        <p class="vv-hint" id="vvHint">Trascina per esplorare · rotella per zoom · frecce per cambiare stanza</p>
        <button type="button" class="vv-nav-btn vv-nav-prev" id="vvPrev" aria-label="Stanza precedente">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button type="button" class="vv-nav-btn vv-nav-next" id="vvNext" aria-label="Stanza successiva">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <footer class="vv-footer">
      <div class="vv-thumbs" id="vvThumbs" aria-label="Stanze della visita"></div>
    </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/visita-virtuale.js?v=2" defer></script>
</body>
</html>

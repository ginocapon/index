*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --flame:#FF6B35;--flame2:#FF8F5E;--flame-deep:#3D1A00;

html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--deep);color:var(--dark);line-height:1.7;overflow-x:hidden;min-height:100vh}

.topbar{background:linear-gradient(90deg,var(--flame),var(--fire),var(--flame));background-size:200% 200%;animation:gradShift 4s ease infinite;padding:.6rem 1rem;text-align:center;font-size:.78rem;color:var(--white);font-weight:600}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.chat-header{background:linear-gradient(135deg,#2a1510,#5C3A28);padding:1rem 1.5rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.chat-header-icon{width:48px;height:48px;border-radius:50%;border:3px solid rgba(255,107,53,.4);background:rgba(255,107,53,.15);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.chat-header-info h2{color:#fff;font-size:1rem;font-weight:700;margin:0}
.chat-header-info p{color:rgba(255,255,255,.7);font-size:.72rem;margin:0}
.chat-header-status{width:10px;height:10px;background:var(--mint);border-radius:50%;animation:pulse 2s infinite;margin-left:auto;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

.cf-container{max-width:600px;margin:0 auto;min-height:calc(100vh - 120px);display:flex;flex-direction:column}
.cf-progress-wrap{background:rgba(255,255,255,.08);padding:.5rem 1rem;display:flex;align-items:center;gap:.6rem;position:relative}
.cf-progress-bar{height:4px;background:linear-gradient(90deg,var(--flame),var(--fire));border-radius:4px;transition:width .5s ease;position:absolute;bottom:0;left:0}
.cf-progress-label{font-size:.65rem;color:rgba(255,255,255,.45);font-weight:600;letter-spacing:.05em}

.cf-chat{flex:1;padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.6rem}

.cf-row{opacity:0;transform:translateY(20px);transition:all .4s ease}
.cf-row.cf-visible{opacity:1;transform:translateY(0)}
.cf-row-bot{display:flex;align-items:flex-start;gap:.5rem}
.cf-row-user{display:flex;justify-content:flex-end}
.cf-row-image{display:flex;justify-content:center;padding:.3rem 0}
.cf-row-buttons{display:flex;justify-content:flex-end}
.cf-row-form{width:100%}

.cf-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--flame);flex-shrink:0;background:rgba(255,107,53,.15);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}

.cf-bubble{max-width:85%;padding:.75rem 1rem;border-radius:16px;font-size:.88rem;line-height:1.6;animation:fadeIn .3s ease}
.cf-bubble-bot{background:rgba(255,255,255,.95);color:var(--dark);border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.cf-bubble-bot strong{color:#C0441A}
.cf-bubble-user{background:var(--flame);color:var(--white);border-bottom-right-radius:4px;font-weight:600}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.cf-image{width:100%;max-width:480px;border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,.2);object-fit:cover;aspect-ratio:16/9}

.cf-buttons{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:flex-end}
.cf-btn{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.25);color:#fff;padding:.55rem 1.1rem;border-radius:50px;font-family:'Montserrat',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .25s;backdrop-filter:blur(4px)}
.cf-btn:hover{background:var(--flame);border-color:var(--flame);color:var(--white);transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,.4)}
.cf-btn-selected{background:var(--flame)!important;border-color:var(--flame)!important;color:var(--white)!important}
.cf-btn-disabled{opacity:.4;pointer-events:none}

.cf-form{background:rgba(255,255,255,.95);border-radius:var(--radius);padding:1.2rem;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.cf-form-group{margin-bottom:.7rem}
.cf-form-label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:.2rem;font-weight:600}
.cf-form-input{width:100%;border:2px solid #E5E7EB;border-radius:10px;padding:.6rem .8rem;font-family:'Montserrat',sans-serif;font-size:.85rem;background:#fff;color:var(--dark);transition:border-color .2s}
.cf-form-input:focus{outline:none;border-color:var(--flame);box-shadow:0 0 0 3px rgba(255,107,53,.12)}
.cf-input-error{border-color:#e53e3e!important}
.cf-form-check{font-size:.7rem;color:var(--gray);margin:.6rem 0;display:flex;align-items:flex-start;gap:.4rem}
.cf-form-check input{accent-color:var(--flame);margin-top:.15rem;flex-shrink:0}
.cf-form-check a{color:#C0441A}
.cf-submit{width:100%;background:linear-gradient(135deg,var(--flame),var(--flame2));color:var(--white);border:none;padding:.75rem;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:.5rem}
.cf-submit:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,107,53,.4)}

.cf-stima{background:linear-gradient(135deg,#2a1510,#5C3A28);border-radius:var(--radius);padding:1.5rem;color:#fff;text-align:center}
.cf-stima-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--flame2);margin-bottom:.3rem}
.cf-stima-value{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:700;color:var(--flame);line-height:1.1}
.cf-stima-range{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:.3rem}
.cf-stima-mq{font-size:.76rem;color:var(--mint);margin-top:.2rem}

.cf-success{text-align:center;padding:1.5rem;animation:fadeIn .5s ease}
.cf-success h3{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--mint);margin-bottom:.4rem}
.cf-success p{font-size:.85rem;color:rgba(255,255,255,.6)}
.cf-success a{color:var(--flame);font-weight:700}

.footer-mini{background:var(--dark);padding:1.5rem;text-align:center;font-size:.7rem;color:rgba(255,255,255,.45)}
.footer-mini a{color:rgba(255,255,255,.5);margin:0 .5rem}.footer-mini a:hover{color:var(--flame)}

@media(max-width:600px){
  .cf-bubble{max-width:90%;font-size:.84rem}

  .cf-stima-value{font-size:2.2rem}
}

<script>
document.addEventListener('DOMContentLoaded', function() {

  var steps = [
    // Step 1: Benvenuto
    { play: function(cf) {
      return cf.addBubble('<strong>Ciao!</strong> La bolletta del gas ti preoccupa, soprattutto con l\'inverno alle porte?', 'bot', 300)
        .then(function() { return cf.addBubble('Abbiamo negoziato un\'offerta <strong>ENEL Fix Star Gas</strong> in esclusiva per i nostri clienti. Ti faccio qualche domanda per capire se fa al caso tuo.', 'bot', 800); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1585771724684-38269d6639fd?w=600&q=80', 'Fornello a gas cucina domestica', 600); })
        .then(function() { return cf.addButtons(['Si, il gas costa troppo!', 'Quanto posso risparmiare?'], 'interesse'); });
    }},
    // Step 2: Situazione mercato gas
    { play: function(cf) {
      return cf.addBubble('Il mercato del gas &egrave; in piena turbolenza. Le <strong>guerre in Medio Oriente</strong> e le tensioni sui gasdotti europei stanno spingendo i prezzi verso l\'alto.', 'bot', 400)
        .then(function() { return cf.addBubble('Da ottobre 2025 il prezzo del gas &egrave; gi&agrave; aumentato del <strong>18%</strong>. E le previsioni per i prossimi mesi non sono incoraggianti: gli analisti prevedono <strong>ulteriori rialzi del 10-15%</strong>.', 'bot', 800); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?w=600&q=80', 'Andamento prezzi gas naturale', 600); })
        .then(function() { return cf.addButtons(['Come posso proteggermi?', 'Qual &egrave; l\'offerta?'], 'reazione_mercato'); });
    }},
    // Step 3: Presenta offerta
    { play: function(cf) {
      return cf.addBubble('Ecco l\'offerta esclusiva che abbiamo ottenuto con ENEL per i nostri clienti:', 'bot', 400)
        .then(function() {
          var html = '<div class="cf-stima">' +
            '<div class="cf-stima-label">ENEL FIX STAR GAS</div>' +
            '<div class="cf-stima-value">0,37 &euro;/SMC</div>' +
            '<div class="cf-stima-range">+ 12,00 &euro;/mese di contributo fisso</div>' +
            '<div class="cf-stima-mq">Prezzo bloccato &middot; Valido fino al 31/03/2026</div>' +
            '</div>';
          return cf.addBubble(html, 'bot', 600);
        })
        .then(function() { return cf.addButtons(['Molto interessante!', 'Ci sono vincoli o costi nascosti?'], 'reazione_offerta'); });
    }},
    // Step 4: Vantaggi / Vincoli
    { play: function(cf) {
      var msg = cf.data.reazione_offerta === 'Ci sono vincoli o costi nascosti?'
        ? '<strong>Zero vincoli e zero costi nascosti!</strong> Puoi recedere in qualsiasi momento senza penali. Nessun costo di attivazione. Nessuna sorpresa in bolletta.'
        : '<strong>E c\'&egrave; di pi&uacute;!</strong> Nessun vincolo contrattuale, zero costi di attivazione, nessuna spesa nascosta. Puoi cambiare idea quando vuoi.';
      return cf.addBubble(msg, 'bot', 400)
        .then(function() { return cf.addBubble('Inoltre hai un <strong>operatore dedicato</strong> che ti segue personalmente: ti spiega l\'andamento dei costi del gas, ti aiuta a leggere la bolletta e ti assiste per qualsiasi problema.', 'bot', 800); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1556761175-5973dc0f32e7?w=600&q=80', 'Consulente che assiste un cliente', 600); })
        .then(function() { return cf.addButtons(['Ottimo, voglio saperne di pi&uacute;', 'Quanto risparmierei?'], 'interesse_dettaglio'); });
    }},
    // Step 5: Tipo riscaldamento
    { play: function(cf) {
      return cf.addBubble('Per stimare il tuo risparmio: <strong>come riscaldi casa</strong>?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1513694203232-719a280e022f?w=600&q=80', 'Interno soggiorno riscaldato', 400); })
        .then(function() { return cf.addButtons([
          'Caldaia a gas', 'Riscaldamento autonomo', 'Centralizzato con gas', 'Solo acqua calda e cucina'
        ], 'tipo_riscaldamento'); });
    }},
    // Step 6: Dimensione casa
    { play: function(cf) {
      return cf.addBubble('<strong>Quanto &egrave; grande</strong> la tua casa?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=600&q=80', 'Interno casa spaziosa', 400); })
        .then(function() { return cf.addButtons([
          'Fino a 60 mq', '60-100 mq', '100-150 mq', 'Oltre 150 mq'
        ], 'dimensione'); });
    }},
    // Step 7: Spesa attuale
    { play: function(cf) {
      return cf.addBubble('Quanto spendi <strong>in media al mese</strong> di bolletta gas (media annua)?', 'bot', 400)
        .then(function() { return cf.addButtons([
          'Meno di 60 &euro;', '60-100 &euro;', '100-150 &euro;', 'Oltre 150 &euro;'
        ], 'spesa_attuale'); });
    }},
    // Step 8: Stima risparmio
    { play: function(cf) {
      var risparmi = {
        'Meno di 60 &euro;': { annuo: '80-150', mese: '7-12' },
        '60-100 &euro;': { annuo: '150-280', mese: '12-23' },
        '100-150 &euro;': { annuo: '280-420', mese: '23-35' },
        'Oltre 150 &euro;': { annuo: '400-600', mese: '33-50' }
      };
      var r = risparmi[cf.data.spesa_attuale] || { annuo: '200-350', mese: '17-29' };
      cf.data.risparmio_annuo = r.annuo;

      return cf.addBubble('In base al tuo profilo di consumo, con l\'offerta ENEL Fix Star Gas potresti risparmiare:', 'bot', 400)
        .then(function() {
          var html = '<div class="cf-stima">' +
            '<div class="cf-stima-label">STIMA RISPARMIO ANNUO</div>' +
            '<div class="cf-stima-value">' + r.annuo + ' &euro;</div>' +
            '<div class="cf-stima-range">Circa ' + r.mese + ' &euro; al mese in meno</div>' +
            '<div class="cf-stima-mq">Con prezzo bloccato &middot; Zero sorprese</div>' +
            '</div>';
          return cf.addBubble(html, 'bot', 600);
        })
        .then(function() { return cf.addButtons(['Voglio attivare!', 'Ho qualche dubbio'], 'decisione'); });
    }},
    // Step 9: Rassicurazione o urgenza
    { play: function(cf) {
      if (cf.data.decisione === 'Ho qualche dubbio') {
        return cf.addBubble('Capisco! Ecco perch&eacute; questa offerta &egrave; <strong>a rischio zero</strong>:', 'bot', 400)
          .then(function() { return cf.addBubble('&#10004; <strong>Zero vincoli</strong> &mdash; recedi quando vuoi, gratis<br>&#10004; <strong>Zero costi attivazione</strong> &mdash; inizi senza spendere nulla<br>&#10004; <strong>Prezzo bloccato</strong> &mdash; niente aumenti per tutta la durata<br>&#10004; <strong>Operatore dedicato</strong> &mdash; un professionista ti segue passo passo', 'bot', 600); })
          .then(function() { return cf.addButtons(['Ok, procediamo!', 'Vorrei essere ricontattato'], 'rassicurazione'); });
      } else {
        return cf.addBubble('<strong>Ottima scelta!</strong> L\'offerta scade il <strong>31 marzo 2026</strong>. Con le tensioni geopolitiche in Medio Oriente, il gas continuer&agrave; a costare di pi&uacute;. Bloccare adesso &egrave; la decisione giusta.', 'bot', 400)
          .then(function() { return cf.addImage('https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=600&q=80', 'Risparmio in bolletta', 400); })
          .then(function() { return cf.addButtons(['Procediamo!'], 'conferma_attivazione'); });
      }
    }},
    // Step 10: Contatto
    { play: function(cf) {
      return cf.addBubble('Perfetto! Lasciaci i tuoi dati e un nostro <strong>operatore dedicato</strong> ti ricontatter&agrave; per:', 'bot', 400)
        .then(function() { return cf.addBubble('&#128222; Spiegarti ogni dettaglio dell\'offerta<br>&#128196; Aiutarti con l\'attivazione senza stress<br>&#128200; Analizzare la tua bolletta del gas attuale<br><br>Tutto <strong>senza impegno</strong> e <strong>senza costi</strong>.', 'bot', 600); })
        .then(function() {
          return cf.addInput([
            { key: 'nome', label: 'Nome', placeholder: 'Il tuo nome', type: 'text' },
            { key: 'email', label: 'Email', placeholder: 'mario@email.it', type: 'email' },
            { key: 'telefono', label: 'Telefono', placeholder: '333 123 4567', type: 'tel' }
          ]);
        });
    }},
    // Step 11: Successo
    { play: function(cf) {
      return cf.addBubble('<strong>Grazie!</strong> Abbiamo ricevuto la tua richiesta.', 'bot', 300)
        .then(function() {
          return cf.addBubble('Un nostro operatore ti contatter&agrave; entro <strong>24 ore</strong> per attivare l\'offerta ENEL Fix Star Gas a <strong>0,37 &euro;/SMC</strong>.', 'bot', 600);
        })
        .then(function() {
          var html = '<div class="cf-success">' +
            '<h3>Richiesta inviata!</h3>' +
            '<p>Hai fretta? Chiamaci subito:<br><a href="tel:+390498843484">049.88.43.484</a><br>' +
            'o scrivici su <a href="https://wa.me/393497365930" target="_blank" rel="noopener noreferrer">WhatsApp</a></p>' +
            '</div>';
          return cf.addBubble(html, 'bot', 800);
        })
        .then(function() { return new Promise(function() {}); });
    }}
  ];

  new ChatFlow('chatFlow', steps, {
    flowId: 'offerta-enel-gas',
    avatarSrc: 'https://images.unsplash.com/photo-1585771724684-38269d6639fd?w=80&q=80',
    avatarName: 'Gas',
    onStepComplete: function(key, value, data) {
      gtag('event', 'chat_step', { flow: 'offerta-enel-gas', step: key, value: value });
    }
  });

});
</script>

# Promemoria piano 90 giorni Righetto — ogni venerdì 07:30 UTC (~09:30 Roma CEST)

name: "Venerdì Righetto — piano settimanale"

on:
  schedule:
    - cron: "30 7 * * 5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  promemoria:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crea Issue promemoria + prompt Cursor
        uses: actions/github-script@v7
        with:
          script: |
            const { buildVenerdiIssue } = require('./scripts/venerdi-righetto-issue.js');
            const { title, body, week } = buildVenerdiIssue();
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
            console.log(`Issue creata: settimana ${week}/12`);

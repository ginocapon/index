# ============================================================
# AUDIT SETTIMANALE SKILL-2.0 — Righetto Immobiliare
# Ogni venerdi' alle 07:00 CET controlla tutte le regole
# e apre una Issue GitHub con il report completo.
# Invia email riepilogativa a info@righettoimmobiliare.it
# ============================================================

name: "Audit Settimanale SKILL-2.0"

on:
  schedule:
    # Ogni venerdi' alle 06:00 UTC = 07:00 CET (ora italiana invernale)
    # In ora legale (CEST) sara' alle 08:00 — accettabile
    - cron: '0 6 * * 5'

  # Permette esecuzione manuale dal tab Actions
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: "Audit SKILL-2.0"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Esegui audit
        id: audit
        run: |
          cd "$GITHUB_WORKSPACE"
          bash scripts/audit-skill.sh audit-report.md
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Leggi report
        if: always()
        id: report
        run: |
          if [ -f audit-report.md ]; then
            {
              echo 'body<<ENDOFREPORT'
              cat audit-report.md
              echo ''
              echo 'ENDOFREPORT'
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=Errore: il report non e' stato generato." >> "$GITHUB_OUTPUT"
          fi

      - name: Crea Issue con report
        if: always() && steps.report.outputs.body
        uses: actions/github-script@v7
        env:
          REPORT_BODY: ${{ steps.report.outputs.body }}
          AUDIT_ERRORS: ${{ steps.audit.outputs.errors || '?' }}
          AUDIT_WARNINGS: ${{ steps.audit.outputs.warnings || '?' }}
          AUDIT_HEALTH: ${{ steps.audit.outputs.health || '?' }}
        with:
          script: |
            const today = new Date();
            const dateStr = today.toLocaleDateString('it-IT', {
              weekday: 'long',
              year: 'numeric',
              month: 'long',
              day: 'numeric'
            });

            const errors = process.env.AUDIT_ERRORS;
            const warnings = process.env.AUDIT_WARNINGS;
            const health = process.env.AUDIT_HEALTH;

            let emoji = '🟢';
            if (errors !== '?' && parseInt(errors) > 0) emoji = '🔴';
            else if (warnings !== '?' && parseInt(warnings) > 5) emoji = '🟡';

            const title = `${emoji} Audit SKILL-2.0 — ${dateStr} (${health}% salute)`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: process.env.REPORT_BODY,
              labels: ['audit']
            });

            core.info(`Issue creata: ${title}`);

      - name: Invia notifica email
        if: always() && steps.audit.outputs.success == 'true'
        env:
          EMAIL_RELAY_KEY: ${{ secrets.EMAIL_RELAY_KEY }}
        run: |
          HEALTH="${{ steps.audit.outputs.health }}"
          ERRORS="${{ steps.audit.outputs.errors }}"
          WARNINGS="${{ steps.audit.outputs.warnings }}"
          DATE=$(date '+%d/%m/%Y')

          if [ -z "$EMAIL_RELAY_KEY" ]; then
            echo "⚠️ Secret EMAIL_RELAY_KEY non configurato — email non inviata"
            exit 0
          fi

          if [ "$ERRORS" -gt 0 ] 2>/dev/null; then
            EMOJI="🔴"
            STATUS="ERRORI CRITICI: $ERRORS"
          elif [ "$WARNINGS" -gt 5 ] 2>/dev/null; then
            EMOJI="🟡"
            STATUS="$WARNINGS avvisi da valutare"
          else
            EMOJI="🟢"
            STATUS="Tutto OK"
          fi

          # Costruisce body email sicuro (evita problemi JSON)
          EMAIL_BODY="<h2>Audit Settimanale SKILL-2.0</h2>"
          EMAIL_BODY+="<p><strong>Data:</strong> $DATE</p>"
          EMAIL_BODY+="<p><strong>Salute:</strong> ${HEALTH}%</p>"
          EMAIL_BODY+="<p><strong>Errori:</strong> $ERRORS | <strong>Avvisi:</strong> $WARNINGS</p>"
          EMAIL_BODY+="<hr>"
          EMAIL_BODY+="<p>Report completo disponibile nelle <a href='https://github.com/${{ github.repository }}/issues?q=label%3Aaudit+sort%3Acreated-desc'>Issue GitHub</a></p>"
          EMAIL_BODY+="<p><em>Audit automatico ogni venerdi ore 07:00 CET</em></p>"

          # Usa jq per costruire JSON sicuro
          PAYLOAD=$(jq -n \
            --arg action "send_single" \
            --arg to "info@righettoimmobiliare.it" \
            --arg subject "$EMOJI Audit SKILL-2.0 del $DATE — Salute: ${HEALTH}% — $STATUS" \
            --arg body "$EMAIL_BODY" \
            '{action: $action, to: $to, subject: $subject, body: $body}')

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.righettoimmobiliare.it/send-mail.php" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $EMAIL_RELAY_KEY" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Email inviata a info@righettoimmobiliare.it"
          else
            echo "⚠️ Email non inviata (HTTP $HTTP_CODE) — controlla il relay PHP"
          fi

# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject admin password
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          python3 << 'PY'
          import json, os
          from pathlib import Path
          path = Path("admin.html")
          text = path.read_text(encoding="utf-8")
          marker = '"__RIGHETTO_ADMIN_PW_JSON__"'
          pwd = (os.environ.get("ADMIN_PASSWORD") or "").strip()
          if marker in text:
            if not pwd:
              print("::error::Segnaposto password in admin.html: imposta secret ADMIN_PASSWORD.")
              exit(1)
            path.write_text(text.replace(marker, json.dumps(pwd)), encoding="utf-8")
            print("OK: password iniettata da secret.")
          else:
            print("OK: nessun segnaposto — si usa la password già in admin.html.")
          PY

      - name: Sync Open Graph immobili (anteprima social)
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -n "$SUPABASE_KEY" ]; then
            python3 scripts/sync_og_immobili.py
          else
            echo "SUPABASE_KEY assente — deploy con share-immobile-*.html già in repo"
            ls share-immobile-*.html 2>/dev/null | wc -l || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Prune duplicate github-pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          artifacts=$(gh api "/repos/$REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '[.artifacts[] | select(.name == "github-pages")] | sort_by(.created_at) | reverse')
          count=$(echo "$artifacts" | jq 'length')
          echo "Found $count github-pages artifact(s) in this run."
          if [ "$count" -le 1 ]; then
            exit 0
          fi
          echo "$artifacts" | jq -r '.[1:] | .[].id' | while read -r id; do
            echo "Deleting duplicate artifact $id"
            gh api -X DELETE "/repos/$REPO/actions/artifacts/$id"
          done

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Se in admin.html c'è il segnaposto "__RIGHETTO_ADMIN_PW_JSON__", sostituisce con secret ADMIN_PASSWORD.
      # Altrimenti usa la password già scritta nel file (deploy dal branch ok).
      - name: Inject admin password (opzionale)
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          python3 << 'PY'
          import json, os
          from pathlib import Path
          path = Path("admin.html")
          text = path.read_text(encoding="utf-8")
          marker = '"__RIGHETTO_ADMIN_PW_JSON__"'
          pwd = (os.environ.get("ADMIN_PASSWORD") or "").strip()
          if marker in text:
            if not pwd:
              print("::error::Segnaposto password in admin.html: imposta secret ADMIN_PASSWORD.")
              exit(1)
            path.write_text(text.replace(marker, json.dumps(pwd)), encoding="utf-8")
            print("OK: password iniettata da secret.")
          else:
            print("OK: nessun segnaposto — si usa la password già in admin.html.")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

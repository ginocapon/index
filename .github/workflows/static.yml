# Deploy static content to GitHub Pages (job unico: build + deploy)
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject admin password
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          python3 << 'PY'
          import json, os
          from pathlib import Path
          path = Path("admin.html")
          text = path.read_text(encoding="utf-8")
          marker = '"__RIGHETTO_ADMIN_PW_JSON__"'
          pwd = (os.environ.get("ADMIN_PASSWORD") or "").strip()
          if marker in text:
            if not pwd:
              print("::error::Segnaposto password in admin.html: imposta secret ADMIN_PASSWORD.")
              exit(1)
            path.write_text(text.replace(marker, json.dumps(pwd)), encoding="utf-8")
            print("OK: password iniettata da secret.")
          else:
            print("OK: nessun segnaposto — si usa la password già in admin.html.")
          PY

      - name: Sync Open Graph immobili (anteprima social)
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -n "$SUPABASE_KEY" ]; then
            python3 scripts/sync_og_immobili.py
          else
            echo "SUPABASE_KEY assente — deploy con share-immobile-*.html già in repo"
            ls share-immobile-*.html 2>/dev/null | wc -l || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

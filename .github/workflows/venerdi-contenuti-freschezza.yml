# ============================================================
# VENERDÌ CONTENUTI & FRESCHEZZA — Righetto Immobiliare
# Ogni venerdì alle 05:00 UTC = 07:00 CEST (ora legale)
# SKIMM + blog + SEO intelligence + probe + report email completo → info@
# ============================================================

name: "Venerdì Contenuti & Freschezza (SKIMM)"

on:
  schedule:
    - cron: "0 5 * * 5"

  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  contenuti-freschezza:
    name: "Audit contenuti settimanale"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements-venerdi.txt

      - name: Dipendenze report PDF
        run: pip install -r scripts/requirements-venerdi.txt

      - name: Esegui audit contenuti + SKIMM
        id: audit
        run: |
          cd "$GITHUB_WORKSPACE"
          python scripts/venerdi-contenuti-freschezza.py
          python scripts/venerdi-seo-intelligence.py
          python scripts/probe_live_urls.py || true
          python scripts/google-compliance-check.py >> venerdi-contenuti-report.md 2>&1 || true
          python scripts/check_doppioni_sito.py >> venerdi-contenuti-report.md 2>&1 || true

      - name: Genera report email completo (blocchi + trend settimanale)
        if: always()
        id: email_report
        env:
          CONTENT_HEALTH: ${{ steps.audit.outputs.health }}
          CONTENT_ARTICLES: ${{ steps.audit.outputs.articles }}
          CONTENT_WARNINGS: ${{ steps.audit.outputs.warnings }}
          CONTENT_ERRORS: ${{ steps.audit.outputs.errors }}
          CONTENT_SKIMM_RISKS: ${{ steps.audit.outputs.skimm_risks }}
          CONTENT_THIN: ${{ steps.audit.outputs.thin_articles }}
          CONTENT_NO_SOL: ${{ steps.audit.outputs.no_righetto_sol }}
          CONTENT_FREE_KW: ${{ steps.audit.outputs.free_keywords }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python scripts/venerdi-report-email.py
          python scripts/venerdi-report-pdf.py

      - name: Salva storico trend GSC nel repo
        if: always() && steps.email_report.outputs.email_ready == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gsc-weekly-history.json
          if git diff --staged --quiet; then
            echo "Storico GSC invariato — nessun commit"
          else
            git commit -m "chore(seo): snapshot GSC settimanale $(date +%Y-%m-%d)"
            git push
          fi

      - name: Leggi report
        if: always()
        id: report
        run: |
          if [ -f venerdi-contenuti-report.md ]; then
            {
              echo 'body<<ENDOFREPORT'
              cat venerdi-contenuti-report.md
              echo ''
              echo 'ENDOFREPORT'
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=Errore: report non generato." >> "$GITHUB_OUTPUT"
          fi

      - name: Crea Issue con report
        if: always() && steps.report.outputs.body
        uses: actions/github-script@v7
        env:
          REPORT_BODY: ${{ steps.report.outputs.body }}
          HEALTH: ${{ steps.audit.outputs.health || '?' }}
          WARNINGS: ${{ steps.audit.outputs.warnings || '?' }}
          ARTICLES: ${{ steps.audit.outputs.articles || '?' }}
        with:
          script: |
            const today = new Date();
            const dateStr = today.toLocaleDateString('it-IT', {
              weekday: 'long',
              year: 'numeric',
              month: 'long',
              day: 'numeric'
            });
            const health = process.env.HEALTH;
            const warnings = process.env.WARNINGS;
            const articles = process.env.ARTICLES;
            let emoji = '🟢';
            if (parseInt(warnings) > 8) emoji = '🟡';
            if (parseInt(health) < 70) emoji = '🔴';
            const title = `${emoji} Venerdì Contenuti — ${dateStr} (${articles} blog, salute ${health}%)`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: process.env.REPORT_BODY,
              labels: ['contenuti-freschezza', 'skimm']
            });

      - name: Invia report email completo a info@righettoimmobiliare.it
        if: always() && steps.email_report.outputs.email_ready == 'true'
        env:
          EMAIL_RELAY_KEY: ${{ secrets.EMAIL_RELAY_KEY }}
        run: |
          if [ -z "$EMAIL_RELAY_KEY" ]; then
            echo "⚠️ Secret EMAIL_RELAY_KEY non configurato — email non inviata"
            exit 0
          fi

          if [ ! -f venerdi-email-report.html ] || [ ! -f venerdi-email-subject.txt ]; then
            echo "⚠️ File report email mancanti"
            exit 0
          fi

          SUBJECT=$(cat venerdi-email-subject.txt)
          EMAIL_BODY=$(cat venerdi-email-report.html)
          PDF_B64=""
          PDF_NAME="verifica-indicizzazioni-righetto-$(date +%Y-%m-%d).pdf"
          if [ -f data/venerdi-report-latest.pdf ]; then
            PDF_B64=$(base64 -w 0 data/venerdi-report-latest.pdf)
          fi

          if [ -n "$PDF_B64" ]; then
            PAYLOAD=$(jq -n \
              --arg action "send_single" \
              --arg to_email "info@righettoimmobiliare.it" \
              --arg subject "$SUBJECT" \
              --arg html_body "$EMAIL_BODY" \
              --arg attachment_base64 "$PDF_B64" \
              --arg attachment_filename "$PDF_NAME" \
              '{action: $action, to_email: $to_email, subject: $subject, html_body: $html_body, attachment_base64: $attachment_base64, attachment_filename: $attachment_filename}')
          else
            PAYLOAD=$(jq -n \
              --arg action "send_single" \
              --arg to_email "info@righettoimmobiliare.it" \
              --arg subject "$SUBJECT" \
              --arg html_body "$EMAIL_BODY" \
              '{action: $action, to_email: $to_email, subject: $subject, html_body: $html_body}')
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.righettoimmobiliare.it/send-mail.php" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $EMAIL_RELAY_KEY" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Report email inviato a info@righettoimmobiliare.it"
          else
            echo "⚠️ Email non inviata (HTTP $HTTP_CODE)"
          fi

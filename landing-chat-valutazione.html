<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#6C63FF;--purple2:#8B83FF;--purple-deep:#2D1B69;
  --fire:#FF6B35;--mint:#00E5A0;--sun:#FFD23F;
  --deep:#0F0A2A;--white:#FFFFFF;--offwhite:#FAFAFA;--light:#F0F0F7;
  --gray:#6B7280;--dark:#111827;--radius:16px;
}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--deep);color:var(--dark);line-height:1.7;overflow-x:hidden;min-height:100vh}

/* TOPBAR */
.topbar{background:linear-gradient(90deg,var(--purple),var(--fire),var(--purple));background-size:200% 200%;animation:gradShift 4s ease infinite;padding:.6rem 1rem;text-align:center;font-size:.78rem;color:#fff;font-weight:600}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* HEADER */
.chat-header{background:var(--purple);padding:1rem 1.5rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(108,99,255,.3)}
.chat-header img{width:48px;height:48px;border-radius:50%;border:3px solid rgba(255,255,255,.3);object-fit:cover}
.chat-header-info h2{color:#fff;font-size:1rem;font-weight:700;margin:0}
.chat-header-info p{color:rgba(255,255,255,.7);font-size:.72rem;margin:0}
.chat-header-status{width:10px;height:10px;background:var(--mint);border-radius:50%;animation:pulse 2s infinite;margin-left:auto;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

/* CHAT CONTAINER */
.cf-container{max-width:600px;margin:0 auto;min-height:calc(100vh - 120px);display:flex;flex-direction:column}

/* PROGRESS */
.cf-progress-wrap{background:rgba(255,255,255,.08);padding:.5rem 1rem;display:flex;align-items:center;gap:.6rem;position:relative}
.cf-progress-bar{height:4px;background:linear-gradient(90deg,var(--purple),var(--mint));border-radius:4px;transition:width .5s ease;position:absolute;bottom:0;left:0}
.cf-progress-label{font-size:.65rem;color:rgba(255,255,255,.45);font-weight:600;letter-spacing:.05em}

/* CHAT AREA */
.cf-chat{flex:1;padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.6rem}

/* ROWS */
.cf-row{opacity:0;transform:translateY(20px);transition:all .4s ease}
.cf-row.cf-visible{opacity:1;transform:translateY(0)}

.cf-row-bot{display:flex;align-items:flex-start;gap:.5rem}
.cf-row-user{display:flex;justify-content:flex-end}
.cf-row-image{display:flex;justify-content:center;padding:.3rem 0}
.cf-row-buttons{display:flex;justify-content:flex-end}
.cf-row-form{width:100%}

/* AVATAR */
.cf-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--purple);flex-shrink:0}

/* BUBBLES */
.cf-bubble{max-width:85%;padding:.75rem 1rem;border-radius:16px;font-size:.88rem;line-height:1.6;animation:fadeIn .3s ease}
.cf-bubble-bot{background:rgba(255,255,255,.95);color:var(--dark);border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.cf-bubble-bot strong{color:var(--purple)}
.cf-bubble-user{background:var(--purple);color:#fff;border-bottom-right-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* IMAGES */
.cf-image{width:100%;max-width:480px;border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,.2);object-fit:cover;aspect-ratio:16/9}

/* BUTTONS */
.cf-buttons{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:flex-end}
.cf-btn{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.25);color:#fff;padding:.55rem 1.1rem;border-radius:50px;font-family:'Montserrat',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .25s;backdrop-filter:blur(4px)}
.cf-btn:hover{background:var(--purple);border-color:var(--purple);transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.cf-btn-selected{background:var(--purple)!important;border-color:var(--purple)!important;color:#fff!important}
.cf-btn-disabled{opacity:.4;pointer-events:none}

/* FORM */
.cf-form{background:rgba(255,255,255,.95);border-radius:var(--radius);padding:1.2rem;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.cf-form-group{margin-bottom:.7rem}
.cf-form-label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:.2rem;font-weight:600}
.cf-form-input{width:100%;border:2px solid #E5E7EB;border-radius:10px;padding:.6rem .8rem;font-family:'Montserrat',sans-serif;font-size:.85rem;background:#fff;color:var(--dark);transition:border-color .2s}
.cf-form-input:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.cf-input-error{border-color:#e53e3e!important}
.cf-form-check{font-size:.7rem;color:var(--gray);margin:.6rem 0;display:flex;align-items:flex-start;gap:.4rem}
.cf-form-check input{accent-color:var(--purple);margin-top:.15rem;flex-shrink:0}
.cf-form-check a{color:var(--purple)}
.cf-submit{width:100%;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border:none;padding:.75rem;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:.5rem}
.cf-submit:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,99,255,.4)}

/* STIMA BOX */
.cf-stima{background:linear-gradient(135deg,var(--purple-deep),#1a0f40);border-radius:var(--radius);padding:1.5rem;color:#fff;text-align:center}
.cf-stima-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--purple2);margin-bottom:.3rem}
.cf-stima-value{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:700;color:var(--sun);line-height:1.1}
.cf-stima-range{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:.3rem}
.cf-stima-mq{font-size:.76rem;color:var(--mint);margin-top:.2rem}

/* SUCCESS */
.cf-success{text-align:center;padding:1.5rem;animation:fadeIn .5s ease}
.cf-success h3{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--mint);margin-bottom:.4rem}
.cf-success p{font-size:.85rem;color:rgba(255,255,255,.6)}
.cf-success a{color:var(--purple2);font-weight:700}

/* FOOTER */
.footer-mini{background:var(--dark);padding:1.5rem;text-align:center;font-size:.7rem;color:rgba(255,255,255,.45)}
.footer-mini a{color:rgba(255,255,255,.5);margin:0 .5rem}.footer-mini a:hover{color:var(--purple)}

@media(max-width:600px){
  .cf-bubble{max-width:90%;font-size:.84rem}
  .cf-btn{font-size:.78rem;padding:.5rem .9rem}
  .cf-stima-value{font-size:2.2rem}
}
</style>

<script src="js/chat-flow.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {

  var steps = [
    // Step 1: Saluto
    { play: function(cf) {
      return cf.addBubble('<strong>Buongiorno!</strong> Stai per prendere una decisione importante e noi siamo qui per aiutarti.', 'bot', 300)
        .then(function() { return cf.addBubble('Vuoi scoprire quanto vale il tuo immobile a Padova? Ti guido io, passo dopo passo.', 'bot', 800); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=600&q=80', 'Famiglia felice nuova casa', 600); })
        .then(function() { return cf.addButtons(['Si, sono curioso!', 'Come funziona?'], 'interesse'); });
    }},
    // Step 2: Zona
    { play: function(cf) {
      var msg = cf.data.interesse === 'Come funziona?'
        ? 'Semplice! Ti faccio qualche domanda sul tuo immobile e alla fine ricevi una <strong>stima gratuita</strong> basata su dati reali del mercato padovano.'
        : 'Perfetto! Cominciamo subito.';
      return cf.addBubble(msg, 'bot', 400)
        .then(function() { return cf.addBubble('<strong>Dove si trova il tuo immobile?</strong>', 'bot', 600); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1524813686514-a57563d77965?w=600&q=80', 'Vista aerea Padova', 400); })
        .then(function() { return cf.addButtons([
          'Padova Centro Storico', 'Padova Arcella', 'Padova Guizza',
          'Abano Terme', 'Albignasego', 'Selvazzano Dentro',
          'Vigonza', 'Limena', 'Altra zona'
        ], 'zona'); });
    }},
    // Step 3: Tipo
    { play: function(cf) {
      return cf.addBubble('Ottima zona! E <strong>che tipo di immobile</strong> vuoi valutare?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600&q=80', 'Diversi tipi di immobili', 400); })
        .then(function() { return cf.addButtons([
          'Appartamento', 'Villa / Villetta', 'Casa indipendente',
          'Bifamiliare', 'Attico / Mansarda', 'Rustico'
        ], 'tipo'); });
    }},
    // Step 4: Dimensione
    { play: function(cf) {
      return cf.addBubble('<strong>Quali sono le dimensioni</strong> approssimative?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600&q=80', 'Interno casa luminosa', 400); })
        .then(function() { return cf.addButtons([
          'Fino a 60 mq', '60-90 mq', '90-120 mq', 'Oltre 120 mq'
        ], 'dimensione'); });
    }},
    // Step 5: Eta
    { play: function(cf) {
      return cf.addBubble('<strong>Quanti anni ha</strong> il tuo immobile?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1448630360428-65456885c650?w=600&q=80', 'Edificio moderno vs storico', 400); })
        .then(function() { return cf.addButtons([
          'Nuovo / Recente', '10-30 anni', '30-50 anni', 'Oltre 50 anni'
        ], 'eta'); });
    }},
    // Step 6: Stato
    { play: function(cf) {
      return cf.addBubble('E in <strong>che stato</strong> si trova attualmente?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600&q=80', 'Casa ristrutturata moderna', 400); })
        .then(function() { return cf.addButtons([
          'Nuovo / Ristrutturato', 'Buone condizioni', 'Da ristrutturare', 'Non lo so'
        ], 'stato'); });
    }},
    // Step 7: Classe energetica
    { play: function(cf) {
      return cf.addBubble('Conosci la <strong>classe energetica</strong>?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=600&q=80', 'Classi energetiche', 400); })
        .then(function() { return cf.addButtons([
          'A / B', 'C / D', 'E / F / G', 'Non lo so'
        ], 'classe_energetica'); });
    }},
    // Step 8: Prezzo o stima
    { play: function(cf) {
      return cf.addBubble('Hai un\'<strong>idea del prezzo</strong> che vorresti realizzare?', 'bot', 400)
        .then(function() { return cf.addButtons([
          'Si, ho un\'idea', 'Vorrei una stima vostra'
        ], 'prezzo_idea'); });
    }},
    // Step 9: Stima
    { play: function(cf) {
      if (cf.data.prezzo_idea === 'Si, ho un\'idea') {
        return cf.addBubble('Ottimo! Potrai indicarlo nel form finale. Intanto ecco la nostra <strong>stima di mercato</strong> basata sui dati reali:', 'bot', 400)
          .then(function() { return cf.addStima(); });
      } else {
        return cf.addBubble('Nessun problema! Il nostro calcolatore ti da una stima basata su <strong>zona, quartiere e stato dell\'immobile</strong>.', 'bot', 400)
          .then(function() { return cf.addStima(); });
      }
    }},
    // Step 10: Extra
    { play: function(cf) {
      return cf.addBubble('C\'e <strong>qualcos\'altro</strong> di speciale nel tuo immobile?', 'bot', 600)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?w=600&q=80', 'Giardino con piscina', 400); })
        .then(function() { return cf.addButtons([
          'Giardino', 'Terrazzo', 'Box / Garage',
          'Ristrutturato di recente', 'Niente di speciale'
        ], 'extra'); });
    }},
    // Step 11: Contatto
    { play: function(cf) {
      return cf.addBubble('Ci siamo quasi! Per ricevere una <strong>valutazione professionale precisa e gratuita</strong>, lasciaci i tuoi riferimenti.', 'bot', 400)
        .then(function() { return cf.addBubble('Ti contattiamo entro <strong>24 ore</strong>, senza impegno.', 'bot', 600); })
        .then(function() {
          return cf.addInput([
            { key: 'nome', label: 'Nome', placeholder: 'Il tuo nome', type: 'text' },
            { key: 'email', label: 'Email', placeholder: 'mario@email.it', type: 'email' },
            { key: 'telefono', label: 'Telefono', placeholder: '333 123 4567', type: 'tel' }
          ]);
        });
    }},
    // Step 12: Successo
    { play: function(cf) {
      return cf.addBubble('<strong>Grazie!</strong> Abbiamo ricevuto la tua richiesta.', 'bot', 300)
        .then(function() {
          return cf.addBubble('Un nostro consulente ti contatterai entro <strong>24 ore</strong> per una valutazione precisa e personalizzata del tuo immobile.', 'bot', 600);
        })
        .then(function() {
          var html = '<div class="cf-success">' +
            '<h3>Richiesta inviata!</h3>' +
            '<p>Nel frattempo puoi chiamarci:<br><a href="tel:+390498843484">049.88.43.484</a><br>' +
            'o scriverci su <a href="https://wa.me/393497365930" target="_blank">WhatsApp</a></p>' +
            '</div>';
          return cf.addBubble(html, 'bot', 800);
        })
        .then(function() { return new Promise(function() {}); }); // Fine flusso
    }}
  ];

  new ChatFlow('chatFlow', steps, {
    flowId: 'valutazione',
    avatarSrc: 'img/team/real-state-linda-righetto.webp',
    avatarName: 'Linda',
    onStepComplete: function(key, value, data) {
      gtag('event', 'chat_step', { flow: 'valutazione', step: key, value: value });
    }
  });

});
</script>

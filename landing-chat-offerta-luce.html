<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#FFB300;--amber2:#FFC940;--amber-deep:#4A3000;
  --fire:#FF6B35;--mint:#00E5A0;--sun:#FFD23F;
  --deep:#1a1400;--white:#FFFFFF;--offwhite:#FAFAFA;--light:#F0F0F7;
  --gray:#6B7280;--dark:#111827;--radius:16px;
}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--deep);color:var(--dark);line-height:1.7;overflow-x:hidden;min-height:100vh}

.topbar{background:linear-gradient(90deg,var(--amber),var(--fire),var(--amber));background-size:200% 200%;animation:gradShift 4s ease infinite;padding:.6rem 1rem;text-align:center;font-size:.78rem;color:var(--dark);font-weight:600}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.chat-header{background:linear-gradient(135deg,#1a2a38,#2C4A6E);padding:1rem 1.5rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.chat-header-icon{width:48px;height:48px;border-radius:50%;border:3px solid rgba(255,179,0,.4);background:rgba(255,179,0,.15);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.chat-header-info h2{color:#fff;font-size:1rem;font-weight:700;margin:0}
.chat-header-info p{color:rgba(255,255,255,.7);font-size:.72rem;margin:0}
.chat-header-status{width:10px;height:10px;background:var(--mint);border-radius:50%;animation:pulse 2s infinite;margin-left:auto;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

.cf-container{max-width:600px;margin:0 auto;min-height:calc(100vh - 120px);display:flex;flex-direction:column}
.cf-progress-wrap{background:rgba(255,255,255,.08);padding:.5rem 1rem;display:flex;align-items:center;gap:.6rem;position:relative}
.cf-progress-bar{height:4px;background:linear-gradient(90deg,var(--amber),var(--fire));border-radius:4px;transition:width .5s ease;position:absolute;bottom:0;left:0}
.cf-progress-label{font-size:.65rem;color:rgba(255,255,255,.45);font-weight:600;letter-spacing:.05em}

.cf-chat{flex:1;padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.6rem}

.cf-row{opacity:0;transform:translateY(20px);transition:all .4s ease}
.cf-row.cf-visible{opacity:1;transform:translateY(0)}
.cf-row-bot{display:flex;align-items:flex-start;gap:.5rem}
.cf-row-user{display:flex;justify-content:flex-end}
.cf-row-image{display:flex;justify-content:center;padding:.3rem 0}
.cf-row-buttons{display:flex;justify-content:flex-end}
.cf-row-form{width:100%}

.cf-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--amber);flex-shrink:0;background:rgba(255,179,0,.15);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}

.cf-bubble{max-width:85%;padding:.75rem 1rem;border-radius:16px;font-size:.88rem;line-height:1.6;animation:fadeIn .3s ease}
.cf-bubble-bot{background:rgba(255,255,255,.95);color:var(--dark);border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.cf-bubble-bot strong{color:#B8860B}
.cf-bubble-user{background:var(--amber);color:var(--dark);border-bottom-right-radius:4px;font-weight:600}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.cf-image{width:100%;max-width:480px;border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,.2);object-fit:cover;aspect-ratio:16/9}

.cf-buttons{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:flex-end}
.cf-btn{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.25);color:#fff;padding:.55rem 1.1rem;border-radius:50px;font-family:'Montserrat',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .25s;backdrop-filter:blur(4px)}
.cf-btn:hover{background:var(--amber);border-color:var(--amber);color:var(--dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,179,0,.4)}
.cf-btn-selected{background:var(--amber)!important;border-color:var(--amber)!important;color:var(--dark)!important}
.cf-btn-disabled{opacity:.4;pointer-events:none}

.cf-form{background:rgba(255,255,255,.95);border-radius:var(--radius);padding:1.2rem;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.cf-form-group{margin-bottom:.7rem}
.cf-form-label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:.2rem;font-weight:600}
.cf-form-input{width:100%;border:2px solid #E5E7EB;border-radius:10px;padding:.6rem .8rem;font-family:'Montserrat',sans-serif;font-size:.85rem;background:#fff;color:var(--dark);transition:border-color .2s}
.cf-form-input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(255,179,0,.12)}
.cf-input-error{border-color:#e53e3e!important}
.cf-form-check{font-size:.7rem;color:var(--gray);margin:.6rem 0;display:flex;align-items:flex-start;gap:.4rem}
.cf-form-check input{accent-color:var(--amber);margin-top:.15rem;flex-shrink:0}
.cf-form-check a{color:#B8860B}
.cf-submit{width:100%;background:linear-gradient(135deg,var(--amber),var(--amber2));color:var(--dark);border:none;padding:.75rem;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:.5rem}
.cf-submit:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,179,0,.4)}

.cf-stima{background:linear-gradient(135deg,#1a2a38,#2C4A6E);border-radius:var(--radius);padding:1.5rem;color:#fff;text-align:center}
.cf-stima-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--amber2);margin-bottom:.3rem}
.cf-stima-value{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:700;color:var(--amber);line-height:1.1}
.cf-stima-range{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:.3rem}
.cf-stima-mq{font-size:.76rem;color:var(--mint);margin-top:.2rem}

.cf-success{text-align:center;padding:1.5rem;animation:fadeIn .5s ease}
.cf-success h3{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--mint);margin-bottom:.4rem}
.cf-success p{font-size:.85rem;color:rgba(255,255,255,.6)}
.cf-success a{color:var(--amber);font-weight:700}

.footer-mini{background:var(--dark);padding:1.5rem;text-align:center;font-size:.7rem;color:rgba(255,255,255,.45)}
.footer-mini a{color:rgba(255,255,255,.5);margin:0 .5rem}.footer-mini a:hover{color:var(--amber)}

@media(max-width:600px){
  .cf-bubble{max-width:90%;font-size:.84rem}
  .cf-btn{font-size:.78rem;padding:.5rem .9rem}
  .cf-stima-value{font-size:2.2rem}
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {

  var steps = [
    // Step 1: Benvenuto
    { play: function(cf) {
      return cf.addBubble('<strong>Ciao!</strong> Sei stanco di bollette della luce sempre pi&uacute; alte?', 'bot', 300)
        .then(function() { return cf.addBubble('In questo momento abbiamo un\'offerta <strong>ENEL Super Luce</strong> esclusiva per i nostri clienti. Ti faccio qualche domanda per capire se fa al caso tuo.', 'bot', 800); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=600&q=80', 'Lampadine a basso consumo energetico', 600); })
        .then(function() { return cf.addButtons(['Si, le bollette sono troppo alte!', 'Quanto posso risparmiare?'], 'interesse'); });
    }},
    // Step 2: Situazione mercato
    { play: function(cf) {
      return cf.addBubble('Lo sapevi? Le <strong>tensioni geopolitiche in Medio Oriente</strong> stanno facendo impennare i prezzi dell\'energia in tutta Europa.', 'bot', 400)
        .then(function() { return cf.addBubble('Da gennaio 2026 la componente energia &egrave; gi&agrave; aumentata del <strong>12% rispetto al trimestre precedente</strong>. E le previsioni non sono buone.', 'bot', 800); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?w=600&q=80', 'Andamento prezzi energia elettrica', 600); })
        .then(function() { return cf.addButtons(['Come posso proteggermi?', 'Qual &egrave; l\'offerta?'], 'reazione_mercato'); });
    }},
    // Step 3: Presenta offerta
    { play: function(cf) {
      return cf.addBubble('Ecco l\'offerta che abbiamo negoziato in esclusiva con ENEL:', 'bot', 400)
        .then(function() {
          var html = '<div class="cf-stima">' +
            '<div class="cf-stima-label">ENEL SUPER LUCE PRIVATI</div>' +
            '<div class="cf-stima-value">0,126 &euro;/kWh</div>' +
            '<div class="cf-stima-range">+ 14,00 &euro;/mese di contributo fisso</div>' +
            '<div class="cf-stima-mq">Prezzo bloccato &middot; Valido fino al 31/03/2026</div>' +
            '</div>';
          return cf.addBubble(html, 'bot', 600);
        })
        .then(function() { return cf.addButtons(['Interessante!', 'Ci sono vincoli?'], 'reazione_offerta'); });
    }},
    // Step 4: Vantaggi / Vincoli
    { play: function(cf) {
      var msg = cf.data.reazione_offerta === 'Ci sono vincoli?'
        ? '<strong>Assolutamente nessun vincolo!</strong> Puoi recedere quando vuoi, senza penali e senza costi nascosti. &Egrave; una delle cose che rende questa offerta davvero speciale.'
        : '<strong>E la parte migliore?</strong> Nessun vincolo, nessun costo di attivazione, nessuna sorpresa. Puoi recedere quando vuoi.';
      return cf.addBubble(msg, 'bot', 400)
        .then(function() { return cf.addBubble('In pi&uacute;, hai un <strong>operatore dedicato</strong> che ti segue in tutto: ti spiega l\'andamento dei costi dell\'energia, ti aiuta con le bollette e con qualsiasi dubbio.', 'bot', 800); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1556761175-5973dc0f32e7?w=600&q=80', 'Consulente che assiste un cliente', 600); })
        .then(function() { return cf.addButtons(['Perfetto, voglio saperne di pi&uacute;', 'Quanto risparmierei?'], 'interesse_dettaglio'); });
    }},
    // Step 5: Tipo abitazione
    { play: function(cf) {
      return cf.addBubble('Per capire quanto puoi risparmiare, dimmi: <strong>che tipo di abitazione</strong> hai?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=600&q=80', 'Interno di casa luminosa', 400); })
        .then(function() { return cf.addButtons([
          'Appartamento', 'Villa / Villetta', 'Casa indipendente', 'Bilocale / Monolocale'
        ], 'tipo_abitazione'); });
    }},
    // Step 6: Nucleo familiare
    { play: function(cf) {
      return cf.addBubble('<strong>Quante persone</strong> vivono in casa?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=600&q=80', 'Famiglia in soggiorno', 400); })
        .then(function() { return cf.addButtons([
          '1-2 persone', '3-4 persone', '5+ persone'
        ], 'nucleo'); });
    }},
    // Step 7: Spesa attuale
    { play: function(cf) {
      return cf.addBubble('Quanto spendi <strong>in media al mese</strong> di bolletta luce?', 'bot', 400)
        .then(function() { return cf.addButtons([
          'Meno di 50 &euro;', '50-80 &euro;', '80-120 &euro;', 'Oltre 120 &euro;'
        ], 'spesa_attuale'); });
    }},
    // Step 8: Stima risparmio
    { play: function(cf) {
      var risparmi = {
        'Meno di 50 &euro;': { annuo: '60-100', mese: '5-8' },
        '50-80 &euro;': { annuo: '120-200', mese: '10-17' },
        '80-120 &euro;': { annuo: '200-350', mese: '17-29' },
        'Oltre 120 &euro;': { annuo: '350-500', mese: '29-42' }
      };
      var r = risparmi[cf.data.spesa_attuale] || { annuo: '150-300', mese: '12-25' };
      cf.data.risparmio_annuo = r.annuo;

      return cf.addBubble('In base a quello che mi hai detto, con l\'offerta ENEL Super Luce potresti risparmiare:', 'bot', 400)
        .then(function() {
          var html = '<div class="cf-stima">' +
            '<div class="cf-stima-label">STIMA RISPARMIO ANNUO</div>' +
            '<div class="cf-stima-value">' + r.annuo + ' &euro;</div>' +
            '<div class="cf-stima-range">Circa ' + r.mese + ' &euro; al mese in meno</div>' +
            '<div class="cf-stima-mq">Con prezzo bloccato &middot; Zero sorprese</div>' +
            '</div>';
          return cf.addBubble(html, 'bot', 600);
        })
        .then(function() { return cf.addButtons(['Voglio attivare!', 'Ho ancora qualche dubbio'], 'decisione'); });
    }},
    // Step 9: Rassicurazione o urgenza
    { play: function(cf) {
      if (cf.data.decisione === 'Ho ancora qualche dubbio') {
        return cf.addBubble('Capisco perfettamente! Ecco perch&eacute; questa offerta &egrave; <strong>senza rischi</strong>:', 'bot', 400)
          .then(function() { return cf.addBubble('&#10004; <strong>Zero vincoli</strong> &mdash; puoi recedere quando vuoi<br>&#10004; <strong>Zero costi attivazione</strong> &mdash; non paghi niente per partire<br>&#10004; <strong>Prezzo bloccato</strong> &mdash; niente aumenti per tutta la durata<br>&#10004; <strong>Operatore dedicato</strong> &mdash; ti seguiamo passo passo', 'bot', 600); })
          .then(function() { return cf.addButtons(['Ok, mi hai convinto!', 'Vorrei essere ricontattato'], 'rassicurazione'); });
      } else {
        return cf.addBubble('<strong>Ottima scelta!</strong> Ricorda: l\'offerta scade il <strong>31 marzo 2026</strong>. Con le tensioni in Medio Oriente, i prezzi dell\'energia continueranno a salire. Bloccare adesso &egrave; la mossa giusta.', 'bot', 400)
          .then(function() { return cf.addImage('https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=600&q=80', 'Risparmio in bolletta', 400); })
          .then(function() { return cf.addButtons(['Procediamo!'], 'conferma_attivazione'); });
      }
    }},
    // Step 10: Contatto
    { play: function(cf) {
      return cf.addBubble('Perfetto! Lasciaci i tuoi dati e un nostro <strong>operatore dedicato</strong> ti ricontatter&agrave; per:', 'bot', 400)
        .then(function() { return cf.addBubble('&#128222; Spiegarti nel dettaglio l\'offerta<br>&#128196; Aiutarti con l\'attivazione<br>&#128200; Analizzare la tua bolletta attuale<br><br>Tutto <strong>senza impegno</strong> e <strong>senza costi</strong>.', 'bot', 600); })
        .then(function() {
          return cf.addInput([
            { key: 'nome', label: 'Nome', placeholder: 'Il tuo nome', type: 'text' },
            { key: 'email', label: 'Email', placeholder: 'mario@email.it', type: 'email' },
            { key: 'telefono', label: 'Telefono', placeholder: '333 123 4567', type: 'tel' }
          ]);
        });
    }},
    // Step 11: Successo
    { play: function(cf) {
      return cf.addBubble('<strong>Grazie!</strong> Abbiamo ricevuto la tua richiesta.', 'bot', 300)
        .then(function() {
          return cf.addBubble('Un nostro operatore ti contatter&agrave; entro <strong>24 ore</strong> per attivare l\'offerta ENEL Super Luce a <strong>0,126 &euro;/kWh</strong>.', 'bot', 600);
        })
        .then(function() {
          var html = '<div class="cf-success">' +
            '<h3>Richiesta inviata!</h3>' +
            '<p>Hai fretta? Chiamaci subito:<br><a href="tel:+390498843484">049.88.43.484</a><br>' +
            'o scrivici su <a href="https://wa.me/393497365930" target="_blank">WhatsApp</a></p>' +
            '</div>';
          return cf.addBubble(html, 'bot', 800);
        })
        .then(function() { return new Promise(function() {}); });
    }}
  ];

  new ChatFlow('chatFlow', steps, {
    flowId: 'offerta-enel-luce',
    avatarSrc: 'https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=80&q=80',
    avatarName: 'Energia',
    onStepComplete: function(key, value, data) {
      gtag('event', 'chat_step', { flow: 'offerta-enel-luce', step: key, value: value });
    }
  });

});
</script>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#6C63FF;--purple2:#8B83FF;--purple-deep:#2D1B69;
  --fire:#FF6B35;--fire2:#FF8F5E;--mint:#00E5A0;--sun:#FFD23F;

html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--deep);color:var(--dark);line-height:1.7;overflow-x:hidden;min-height:100vh}

.topbar{background:linear-gradient(90deg,var(--fire),var(--sun),var(--fire));background-size:200% 200%;animation:gradShift 4s ease infinite;padding:.6rem 1rem;text-align:center;font-size:.78rem;color:#fff;font-weight:600}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.chat-header{background:var(--fire);padding:1rem 1.5rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(255,107,53,.3)}
.chat-header img{width:48px;height:48px;border-radius:50%;border:3px solid rgba(255,255,255,.3);object-fit:cover}
.chat-header-info h2{color:#fff;font-size:1rem;font-weight:700;margin:0}
.chat-header-info p{color:rgba(255,255,255,.7);font-size:.72rem;margin:0}
.chat-header-status{width:10px;height:10px;background:var(--mint);border-radius:50%;animation:pulse 2s infinite;margin-left:auto;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

.cf-container{max-width:600px;margin:0 auto;min-height:calc(100vh - 120px);display:flex;flex-direction:column}
.cf-progress-wrap{background:rgba(255,255,255,.08);padding:.5rem 1rem;display:flex;align-items:center;gap:.6rem;position:relative}
.cf-progress-bar{height:4px;background:linear-gradient(90deg,var(--fire),var(--sun));border-radius:4px;transition:width .5s ease;position:absolute;bottom:0;left:0}
.cf-progress-label{font-size:.65rem;color:rgba(255,255,255,.45);font-weight:600;letter-spacing:.05em}
.cf-chat{flex:1;padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.6rem}
.cf-row{opacity:0;transform:translateY(20px);transition:all .4s ease}
.cf-row.cf-visible{opacity:1;transform:translateY(0)}
.cf-row-bot{display:flex;align-items:flex-start;gap:.5rem}
.cf-row-user{display:flex;justify-content:flex-end}
.cf-row-image{display:flex;justify-content:center;padding:.3rem 0}
.cf-row-buttons{display:flex;justify-content:flex-end}
.cf-row-form{width:100%}
.cf-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--fire);flex-shrink:0}
.cf-bubble{max-width:85%;padding:.75rem 1rem;border-radius:16px;font-size:.88rem;line-height:1.6;animation:fadeIn .3s ease}
.cf-bubble-bot{background:rgba(255,255,255,.95);color:var(--dark);border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.cf-bubble-bot strong{color:var(--fire)}
.cf-bubble-user{background:var(--fire);color:#fff;border-bottom-right-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.cf-image{width:100%;max-width:480px;border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,.2);object-fit:cover;aspect-ratio:16/9}
.cf-buttons{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:flex-end}
.cf-btn{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.25);color:#fff;padding:.55rem 1.1rem;border-radius:50px;font-family:'Montserrat',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .25s;backdrop-filter:blur(4px)}
.cf-btn:hover{background:var(--fire);border-color:var(--fire);transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,.4)}
.cf-btn-selected{background:var(--fire)!important;border-color:var(--fire)!important;color:#fff!important}
.cf-btn-disabled{opacity:.4;pointer-events:none}
.cf-form{background:rgba(255,255,255,.95);border-radius:var(--radius);padding:1.2rem;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.cf-form-group{margin-bottom:.7rem}
.cf-form-label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:.2rem;font-weight:600}
.cf-form-input{width:100%;border:2px solid #E5E7EB;border-radius:10px;padding:.6rem .8rem;font-family:'Montserrat',sans-serif;font-size:.85rem;background:#fff;color:var(--dark);transition:border-color .2s}
.cf-form-input:focus{outline:none;border-color:var(--fire);box-shadow:0 0 0 3px rgba(255,107,53,.12)}
.cf-input-error{border-color:#e53e3e!important}
.cf-form-check{font-size:.7rem;color:var(--gray);margin:.6rem 0;display:flex;align-items:flex-start;gap:.4rem}
.cf-form-check input{accent-color:var(--fire);margin-top:.15rem;flex-shrink:0}
.cf-form-check a{color:var(--fire)}
.cf-submit{width:100%;background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;border:none;padding:.75rem;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:.5rem}
.cf-submit:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,107,53,.4)}
.cf-stima{background:linear-gradient(135deg,#2a0a00,#4a1500);border-radius:var(--radius);padding:1.5rem;color:#fff;text-align:center}
.cf-stima-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--fire2);margin-bottom:.3rem}
.cf-stima-value{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:700;color:var(--sun);line-height:1.1}
.cf-stima-range{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:.3rem}
.cf-stima-mq{font-size:.76rem;color:var(--mint);margin-top:.2rem}
.cf-success{text-align:center;padding:1.5rem;animation:fadeIn .5s ease}
.cf-success h3{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--mint);margin-bottom:.4rem}
.cf-success p{font-size:.85rem;color:rgba(255,255,255,.6)}
.cf-success a{color:var(--fire2);font-weight:700}
.footer-mini{background:var(--dark);padding:1.5rem;text-align:center;font-size:.7rem;color:rgba(255,255,255,.45)}
.footer-mini a{color:rgba(255,255,255,.5);margin:0 .5rem}.footer-mini a:hover{color:var(--fire)}
@media(max-width:600px){
  .cf-bubble{max-width:90%;font-size:.84rem}
  .cf-btn{font-size:.78rem;padding:.5rem .9rem}
  .cf-stima-value{font-size:2.2rem}
}

<script>
document.addEventListener('DOMContentLoaded', function() {

  var steps = [
    // Step 1: Saluto empatico
    { play: function(cf) {
      return cf.addBubble('<strong>Buongiorno!</strong> Vendere casa e una decisione importante. Noi siamo qui per accompagnarti in ogni passo.', 'bot', 300)
        .then(function() { return cf.addBubble('Raccontami un po\' della tua situazione: ti aiuto a trovare la strada migliore.', 'bot', 800); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1560520031-3a4dc4e9de0c?w=600&q=80', 'Stretta di mano consulenza', 600); })
        .then(function() { return cf.addButtons(['Voglio vendere casa', 'Sto solo valutando'], 'intenzione'); });
    }},
    // Step 2: Motivazione
    { play: function(cf) {
      var msg = cf.data.intenzione === 'Sto solo valutando'
        ? 'Nessun problema! Anche solo capire le opzioni e un ottimo primo passo.'
        : 'Perfetto, sei nel posto giusto!';
      return cf.addBubble(msg, 'bot', 400)
        .then(function() { return cf.addBubble('<strong>Perche stai pensando di vendere?</strong>', 'bot', 600); })
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600&q=80', 'Casa moderna', 400); })
        .then(function() { return cf.addButtons([
          'Cambio casa', 'Trasferimento', 'Investimento',
          'Separazione / Eredita', 'Altro motivo'
        ], 'motivazione'); });
    }},
    // Step 3: Tipo immobile
    { play: function(cf) {
      return cf.addBubble('Capisco. E <strong>che tipo di immobile</strong> vuoi vendere?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600&q=80', 'Tipi di immobili', 400); })
        .then(function() { return cf.addButtons([
          'Appartamento', 'Villa / Villetta', 'Casa indipendente',
          'Bifamiliare', 'Attico / Mansarda', 'Rustico'
        ], 'tipo'); });
    }},
    // Step 4: Dove
    { play: function(cf) {
      return cf.addBubble('<strong>Dove si trova?</strong>', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1524813686514-a57563d77965?w=600&q=80', 'Padova dall\'alto', 400); })
        .then(function() { return cf.addButtons([
          'Padova Centro Storico', 'Padova Arcella', 'Padova Guizza',
          'Abano Terme', 'Albignasego', 'Selvazzano Dentro',
          'Vigonza', 'Limena', 'Altra zona'
        ], 'zona'); });
    }},
    // Step 5: Dimensione
    { play: function(cf) {
      return cf.addBubble('<strong>Quanto e grande</strong> il tuo immobile?', 'bot', 400)
        .then(function() { return cf.addButtons([
          'Fino a 60 mq', '60-90 mq', '90-120 mq', 'Oltre 120 mq'
        ], 'dimensione'); });
    }},
    // Step 6: Tempistiche
    { play: function(cf) {
      return cf.addBubble('E in <strong>quanto tempo</strong> vorresti vendere?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1434626881859-194d67b2b86f?w=600&q=80', 'Calendario tempistiche', 400); })
        .then(function() { return cf.addButtons([
          'Il prima possibile', 'Entro 3 mesi', 'Entro 6 mesi', 'Nessuna fretta'
        ], 'tempistiche'); });
    }},
    // Step 7: Esperienza precedente
    { play: function(cf) {
      return cf.addBubble('Hai gia <strong>provato a vendere</strong> da solo o con un\'altra agenzia?', 'bot', 400)
        .then(function() { return cf.addButtons([
          'No, e la prima volta', 'Si, da solo', 'Si, con altra agenzia', 'E attualmente in vendita'
        ], 'esperienza'); });
    }},
    // Step 8: Stato immobile
    { play: function(cf) {
      return cf.addBubble('In <strong>che stato</strong> si trova l\'immobile?', 'bot', 400)
        .then(function() { return cf.addImage('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600&q=80', 'Interno casa', 400); })
        .then(function() { return cf.addButtons([
          'Nuovo / Ristrutturato', 'Buone condizioni', 'Da ristrutturare', 'Non lo so'
        ], 'stato'); });
    }},
    // Step 9: Stima automatica
    { play: function(cf) {
      return cf.addBubble('Ecco cosa dice il mercato per il tuo immobile:', 'bot', 400)
        .then(function() { return cf.addStima(); })
        .then(function() {
          return cf.addBubble('Questa e una stima indicativa. Con un <strong>sopralluogo gratuito</strong> possiamo darti un valore preciso e una strategia di vendita personalizzata.', 'bot', 800);
        });
    }},
    // Step 10: Vantaggi
    { play: function(cf) {
      var vantaggi = '<strong>Ecco cosa facciamo per te:</strong><br>' +
        '✓ Valutazione professionale gratuita<br>' +
        '✓ Foto professionali + Virtual Tour 360°<br>' +
        '✓ Pubblicazione su tutti i portali<br>' +
        '✓ Gestione visite e trattativa<br>' +
        '✓ Assistenza fino al rogito';
      return cf.addBubble(vantaggi, 'bot', 400)
        .then(function() { return cf.addBubble('Vendita media in <strong>45 giorni</strong>, fino al <strong>15% in piu</strong> rispetto al fai-da-te.', 'bot', 600); })
        .then(function() { return cf.addButtons(['Sono interessato!', 'Dimmi di piu'], 'interesse_finale'); });
    }},
    // Step 11: Contatto
    { play: function(cf) {
      return cf.addBubble('Lasciaci i tuoi riferimenti e ti contatteremo per una <strong>consulenza gratuita e senza impegno</strong>.', 'bot', 400)
        .then(function() {
          return cf.addInput([
            { key: 'nome', label: 'Nome', placeholder: 'Il tuo nome', type: 'text' },
            { key: 'email', label: 'Email', placeholder: 'mario@email.it', type: 'email' },
            { key: 'telefono', label: 'Telefono', placeholder: '333 123 4567', type: 'tel' }
          ]);
        });
    }},
    // Step 12: Successo
    { play: function(cf) {
      return cf.addBubble('<strong>Perfetto!</strong> Abbiamo ricevuto la tua richiesta.', 'bot', 300)
        .then(function() {
          return cf.addBubble('Un nostro consulente ti contatterà entro <strong>24 ore</strong> per organizzare un sopralluogo gratuito e iniziare il percorso di vendita insieme.', 'bot', 600);
        })
        .then(function() {
          var html = '<div class="cf-success">' +
            '<h3>Richiesta inviata!</h3>' +
            '<p>Nel frattempo puoi chiamarci:<br><a href="tel:+390498843484">049.88.43.484</a><br>' +
            'o scriverci su <a href="https://wa.me/393497365930" target="_blank">WhatsApp</a></p>' +
            '</div>';
          return cf.addBubble(html, 'bot', 800);
        })
        .then(function() { return new Promise(function() {}); });
    }}
  ];

  new ChatFlow('chatFlow', steps, {
    flowId: 'vendita',
    avatarSrc: 'img/team/real-state-linda-righetto.webp',
    avatarName: 'Linda',
    onStepComplete: function(key, value) {
      gtag('event', 'chat_step', { flow: 'vendita', step: key, value: value });
    }
  });

});
</script>
